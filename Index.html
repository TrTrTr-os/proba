<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тараненко Даниил | Фортех</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #222222;
            --text-main: #f0f0f0;
            --text-muted: #aaaaaa;
            --accent: #ff9900; /* Твой оранжевый */
            --accent-hover: #b96f00;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Google Sans', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .company-name {
            color: var(--accent);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .full-name {
            font-size: 2rem;
            margin: 0 0 20px 0;
            line-height: 1.2;
        }

        .contact-label {
            display: block;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .contact-value {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 30px;
        }

        .btn-call {
            display: inline-block;
            padding: 12px 24px;
            background-color: var(--accent);
            color: #000;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .btn-call:hover {
            background-color: var(--accent-hover);
            transform: scale(1.05);
        }

        @media (max-width: 480px) {
            .card {
                padding: 25px;
            }
            .full-name {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="company-name">Компания Фортех</div>
        <h1 class="full-name">Тараненко<br>Даниил Евгеньевич</h1>
        
        <div style="text-align: left; margin: 0 auto;">
            <span class="contact-label">Телефон</span>
            <div class="contact-value">8 (904) 081-77-12</div>
        </div>

        <a href="tel:+79040817712" class="btn-call">Позвонить</a>
    </div>

</body>
</html>
